<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>COUPANG-AI-SYSTEM</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Malgun Gothic",sans-serif;background:#f6f8fb;color:#1d232a}main{max-width:1120px;margin:0 auto;padding:24px 16px 60px}header{display:flex;gap:18px;justify-content:space-between;align-items:end;margin-bottom:18px}h1{margin:4px 0 0;font-size:clamp(24px,4vw,40px)}h2{font-size:18px;margin:0 0 12px}.brand{color:#0f8b8d;font-weight:900;font-size:14px}.dashboard{display:grid;grid-template-columns:repeat(5,minmax(86px,1fr));gap:8px}.stat,.panel,.result{background:#fff;border:1px solid #dde3ea;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.stat{padding:12px;text-align:center}.stat strong{display:block;color:#0f8b8d;font-size:24px}.stat span{font-size:12px;font-weight:700}.panel,.result{padding:18px}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}label span{display:block;margin-bottom:8px;font-size:14px;font-weight:800}input[type=text],input[type=url]{width:100%;height:48px;border:1px solid #dde3ea;border-radius:6px;padding:10px 12px;background:#fff}.paste-zone{min-height:120px;border:1px dashed #9fb0bf;border-radius:8px;background:#f9fbfd;display:grid;place-items:center;padding:12px;text-align:center;cursor:pointer}.paste-zone:focus{outline:3px solid rgba(15,139,141,.18);border-color:#0f8b8d;background:#fff}.paste-zone img{max-width:100%;max-height:170px;border-radius:6px;display:block;object-fit:contain}.paste-help{margin:0;color:#52616f;font-size:13px;line-height:1.5}button{border:0;border-radius:6px;background:#0f8b8d;color:#fff;height:42px;padding:0 16px;font-weight:900;cursor:pointer}button.secondary{background:#fff;color:#1d232a;border:1px solid #dde3ea}button.big{margin-top:16px;height:50px;width:180px;font-size:16px}.result{display:none;margin-top:18px}.topline{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #dde3ea;padding-bottom:16px}.badges{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.badge{background:#f6f8fb;border-radius:6px;padding:9px;text-align:center;font-size:12px;font-weight:900}section{border-top:1px solid #dde3ea;padding:18px 0}section:first-of-type{border-top:0}ol,.cards{margin:0;padding:0;list-style-position:inside;display:grid;gap:8px}li,.card{background:#f6f8fb;border-radius:6px;padding:12px;line-height:1.55;font-size:14px}.copy-row{display:flex;gap:8px;align-items:start;background:#f6f8fb;padding:12px;border-radius:6px}.copy-row p{margin:0;white-space:pre-wrap;line-height:1.55;flex:1;font-size:14px}.copy-row b{display:block;color:#0f8b8d;margin-bottom:4px}.notice{margin-top:12px;color:#b42318;font-weight:800;font-size:14px}@media(max-width:820px){header,.topline{flex-direction:column;align-items:stretch}.dashboard{grid-template-columns:repeat(2,1fr)}.form-grid,.badges{grid-template-columns:1fr}button.big{width:100%}}
</style>
</head>
<body>
<main>
<header><div><div class="brand">COUPANG-AI-SYSTEM</div><h1>쿠팡 숏폼 콘텐츠 자동 생성</h1></div><div class="dashboard"><div class="stat"><strong id="todayCount">0</strong><span>오늘 생성 수</span></div><div class="stat"><strong id="inforkPending">0</strong><span>인포크 등록 대기</span></div><div class="stat"><strong id="videoPending">0</strong><span>영상 생성 대기</span></div><div class="stat"><strong id="videoDone">0</strong><span>영상 생성 완료</span></div><div class="stat"><strong id="uploadDone">0</strong><span>업로드 완료</span></div></div></header>
<form class="panel" id="contentForm"><div class="form-grid"><label><span>상품 제목</span><input id="productTitle" type="text" required placeholder="예: 무선 미니 청소기" /></label><label><span>상품 이미지 붙여넣기</span><div id="pasteZone" class="paste-zone" tabindex="0"><p class="paste-help">이 영역을 클릭한 뒤<br />캡처한 상품 이미지를 Ctrl+V로 붙여넣으세요</p></div></label><label><span>쿠팡파트너스 링크</span><input id="coupangLink" type="url" required placeholder="https://link.coupang.com/..." /></label></div><button class="big" type="submit">콘텐츠 생성</button><div class="notice" id="notice"></div></form>
<div class="result" id="result"></div>
</main>
<script>
const disclosure="이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.";const state={created:0,inforkPending:0,videoPending:0,videoDone:0,uploadDone:0};let pastedImage=null;
function inferCategory(title){if(/청소|세척|먼지|vacuum/i.test(title))return"생활 정리";if(/가습|공기|향|디퓨저/i.test(title))return"홈케어";if(/충전|케이블|거치|무선/i.test(title))return"디지털 편의";if(/운동|마사지|스트레칭|헬스/i.test(title))return"셀프케어";return"일상 편의"}
function generate(title,link,imageName){const category=inferCategory(title);const hooks=[`이거 하나로 ${category} 스트레스가 확 줄어듭니다`,`${title}, 왜 이제 알았지 싶은 아이템`,`바쁜 사람에게 딱 맞는 ${category} 해결템`,`써보면 매일 손이 가는 이유가 있습니다`,`집에 두면 생각보다 훨씬 자주 씁니다`,`선물용으로도 실패 확률 낮은 실사용템`,`복잡한 기능보다 진짜 필요한 것만 담았습니다`,`10초만 봐도 필요한지 바로 감이 옵니다`,`후기 찾아보는 시간을 줄여주는 선택지`,`가격보다 사용 빈도가 먼저 떠오르는 제품`];const thumbs=["왜 이제 샀지?","매일 쓰는 이유","10초 실사용","집에 두면 편함","선물템 후보","후기 많은 이유","생활이 쉬워짐","깔끔한 해결템","지금 필요한템","실사용 추천"];const scripts=[`첫 3초: "이거 은근히 매일 필요합니다." 제품 클로즈업으로 시작합니다. 4-8초: 실제 사용 장면과 전후 차이를 보여줍니다. 9-12초: ${title}의 핵심 장점을 정리합니다. 마지막: 링크는 고정댓글에서 확인하세요.`,`첫 3초: "이런 상황 자주 겪는다면 보세요." 문제 장면을 먼저 보여줍니다. 4-9초: ${title}을 사용해 해결되는 장면을 보여줍니다. 10-15초: 추천 대상과 고지문구를 안내합니다.`,`첫 3초: "후기 찾아보다가 고른 이유." 제품 이미지와 핵심 문구를 크게 보여줍니다. 4-10초: 사용감, 보관, 편의 포인트를 보여줍니다. 11-15초: 고정댓글 링크 안내로 마무리합니다.`];const captions=[`${title} 실사용 느낌만 짧게 정리했습니다. 필요한 분은 고정댓글 링크 확인해보세요.\n\n${disclosure}`,`요즘 이런 ${category} 아이템 찾는 분들 많죠. 영상처럼 쓰임새가 명확한 제품입니다.\n\n${disclosure}`,`후기 보기 전에 10초 사용 장면부터 확인하세요. 링크는 고정댓글에 남겨둘게요.\n\n${disclosure}`];return{title,category,hooks,thumbs,scripts,captions,analysis:`${title}은 ${category} 상황에서 반복되는 작은 불편을 빠르게 해결하는 데 초점을 둔 숏폼형 추천 상품입니다.`,target:["빠르게 제품 장단점을 파악하고 싶은 모바일 쇼핑 고객",`${category} 문제를 간단히 해결하고 싶은 20-40대 실사용자`,"선물 또는 생활 편의 제품을 찾는 쿠팡 이용자"],benefits:["짧은 숏폼 안에서 사용 장면이 바로 이해됩니다","복잡한 설명보다 실사용 전후 차이를 강조하기 좋습니다","인포크, 쇼츠, 틱톡, 인스타에 동시에 재가공하기 쉽습니다"],youtube:`${title} 숏폼 리뷰입니다.\n\n구매 링크: ${link}\n\n${disclosure}`,tiktok:`${title} 10초 실사용 리뷰. 링크는 프로필/고정댓글 참고. ${disclosure}`,comment:`제품 링크: ${link}\n${disclosure}`,videoPrompt:`9:16 vertical short-form commerce video, 10-15 seconds, first 3 seconds strong Korean hook, product: ${title}, realistic product demo, bright natural lighting, problem-use-result flow, Korean captions`,thumbnailPrompt:`9:16 Korean commerce thumbnail, feature ${title}, large readable Korean headline, clean product-centered composition, bright shopping content style`,imageName}}
function copyText(value){navigator.clipboard.writeText(value||"")}function list(items){return`<ol>${items.map(item=>`<li>${escapeHtml(item)}</li>`).join("")}</ol>`}function copyRow(label,value){return`<div class="copy-row"><p><b>${label}</b>${escapeHtml(value||"없음")}</p><button class="secondary" onclick='copyText(${JSON.stringify(value||"")})'>복사</button></div>`}function escapeHtml(value){return String(value).replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]))}function updateDashboard(){todayCount.textContent=state.created;inforkPending.textContent=state.inforkPending;videoPending.textContent=state.videoPending;videoDone.textContent=state.videoDone;uploadDone.textContent=state.uploadDone}
function setPastedImage(file){if(!file||!file.type.startsWith("image/"))return;pastedImage=file;const previewUrl=URL.createObjectURL(file);pasteZone.innerHTML=`<img src="${previewUrl}" alt="붙여넣은 상품 이미지 미리보기" /><p class="paste-help">${escapeHtml(file.name||"붙여넣은 이미지")}</p>`}pasteZone.addEventListener("click",()=>pasteZone.focus());pasteZone.addEventListener("paste",event=>{const items=Array.from(event.clipboardData?.items||[]);const imageItem=items.find(item=>item.type.startsWith("image/"));if(!imageItem){notice.textContent="클립보드에 이미지가 없습니다. 캡처 후 Ctrl+V로 붙여넣어 주세요.";return}event.preventDefault();setPastedImage(imageItem.getAsFile());notice.textContent="이미지가 붙여넣어졌습니다."});document.addEventListener("paste",event=>{if(document.activeElement===pasteZone)return;const items=Array.from(event.clipboardData?.items||[]);const imageItem=items.find(item=>item.type.startsWith("image/"));if(!imageItem)return;event.preventDefault();setPastedImage(imageItem.getAsFile());notice.textContent="이미지가 붙여넣어졌습니다."});
contentForm.addEventListener("submit",event=>{event.preventDefault();const title=productTitle.value.trim();const link=coupangLink.value.trim();const imageName=pastedImage?pastedImage.name||"붙여넣은 상품 이미지":"붙여넣은 이미지 없음";const data=generate(title,link,imageName);state.created+=1;state.inforkPending+=1;state.videoPending+=1;updateDashboard();notice.textContent="HTML 단독 버전입니다. Notion, Make, Higgsfield, Buffer 실제 연동은 Next.js/Node 버전에서 작동합니다.";result.style.display="block";result.innerHTML=`<div class="topline"><div><div class="brand">생성 완료</div><h1>${escapeHtml(title)}</h1></div><div class="badges"><div class="badge" id="inforkBadge">인포크등록대기</div><div class="badge">영상생성대기</div><div class="badge">업로드대기</div></div></div><section><h2>상품 분석</h2><div class="card">${escapeHtml(data.analysis)}</div></section><section><h2>타겟 고객</h2>${list(data.target)}</section><section><h2>핵심 장점</h2>${list(data.benefits)}</section><section><h2>후킹 10개</h2>${list(data.hooks)}</section><section><h2>썸네일 문구 10개</h2>${list(data.thumbs)}</section><section><h2>영상 대본 3개</h2>${list(data.scripts)}</section><section><h2>인스타 캡션 3개</h2>${list(data.captions)}</section><section><h2>유튜브 설명란</h2>${copyRow("유튜브 설명란",data.youtube)}</section><section><h2>틱톡 캡션</h2>${copyRow("틱톡 캡션",data.tiktok)}</section><section><h2>고정댓글</h2>${copyRow("고정댓글",data.comment)}</section><section><h2>쿠팡파트너스 고지문구</h2>${copyRow("고지문구",disclosure)}</section><section><h2>Higgsfield 생성 데이터</h2>${copyRow("영상 프롬프트",data.videoPrompt)}${copyRow("썸네일 프롬프트",data.thumbnailPrompt)}<div class="card">영상 비율 9:16 / 숏폼 길이 10~15초 / 첫 3초 강력한 후킹 포함</div></section><section><h2>인포크 등록</h2><div class="cards">${copyRow("상품명",title)}${copyRow("설명",`${title}\n\n${data.benefits.join("\n")}\n\n${disclosure}`)}${copyRow("링크",link)}${copyRow("이미지",imageName)}<label class="card"><input type="checkbox" id="inforkDone" /> 인포크 등록 완료</label></div></section>`;inforkDone.addEventListener("change",()=>{if(inforkDone.checked){inforkBadge.textContent="인포크등록완료";state.inforkPending=Math.max(0,state.inforkPending-1);updateDashboard()}})});
</script>
</body>
</html>
