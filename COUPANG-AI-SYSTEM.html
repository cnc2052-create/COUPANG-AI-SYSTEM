<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>COUPANG-AI-SYSTEM</title>
    <style>
      * { box-sizing: border-box; }
      :root {
        --bg: #f3f4f6;
        --panel: #ffffff;
        --ink: #202326;
        --muted: #6f757b;
        --line: #e7e9ec;
        --lime: #c7ff00;
        --lime-soft: #ecff9a;
        --dark: #242927;
        --shadow: 0 18px 45px rgba(30, 34, 38, .08);
      }
      body {
        margin: 0;
        font-family: "Pretendard", "SUIT", "Noto Sans KR", "Apple SD Gothic Neo", "Segoe UI", "Malgun Gothic", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(199, 255, 0, .18), transparent 28%),
          linear-gradient(135deg, #f8f9fb 0%, var(--bg) 55%, #eef1f4 100%);
        color: var(--ink);
      }
      main { max-width: 1180px; margin: 0 auto; padding: 28px 18px 72px; }
      header { display: flex; gap: 22px; justify-content: space-between; align-items: end; margin-bottom: 22px; }
      h1 { margin: 6px 0 0; font-size: clamp(30px, 4vw, 48px); line-height: 1.04; letter-spacing: 0; font-weight: 850; }
      h2 { font-size: 20px; margin: 0 0 12px; letter-spacing: 0; }
      .brand { color: #667200; font-weight: 900; font-size: 13px; letter-spacing: .04em; }
      .quick-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
      .quick-links a { border-radius: 999px; border: 1px solid var(--line); background: var(--panel); color: var(--ink); padding: 10px 14px; text-decoration: none; font-size: 13px; font-weight: 900; box-shadow: 0 8px 20px rgba(30,34,38,.05); }
      .quick-links a:hover { border-color: var(--lime); background: var(--lime); color: var(--ink); }
      .dashboard { display: grid; grid-template-columns: repeat(5, minmax(92px, 1fr)); gap: 10px; }
      .stat, .panel, .result { background: rgba(255,255,255,.92); border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); }
      .stat { min-height: 92px; padding: 16px 12px; text-align: center; display: grid; place-items: center; align-content: center; }
      .stat strong { display: block; color: var(--ink); font-size: 26px; line-height: 1; }
      .stat span { font-size: 12px; font-weight: 900; color: var(--muted); line-height: 1.25; }
      .stat:first-child { background: var(--lime); border-color: var(--lime); }
      .panel, .result { padding: 22px; }
      .research-grid { display: grid; gap: 12px; }
      .quick-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
      .quick-buttons button { height: 40px; background: #f7f8fa; color: var(--ink); border: 1px solid var(--line); border-radius: 999px; }
      .quick-buttons button:hover { background: var(--lime); border-color: var(--lime); }
      .search-row { display: flex; gap: 8px; align-items: center; }
      .search-row input { flex: 1; }
      .examples { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.6; }
      .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 16px; }
      .product-card { border: 1px solid var(--line); border-radius: 20px; background: #fff; padding: 14px; display: grid; gap: 12px; box-shadow: 0 10px 28px rgba(30,34,38,.05); }
      .product-card:hover { transform: translateY(-1px); border-color: #d5d9de; }
      .product-card img { width: 100%; aspect-ratio: 4 / 3; object-fit: contain; border-radius: 16px; background: #f1f3f5; }
      .product-card h3 { margin: 0; font-size: 16px; line-height: 1.35; }
      .product-card p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.5; }
      .grades { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .grade { border-radius: 12px; background: #f4f5f6; padding: 8px; text-align: center; font-size: 12px; font-weight: 900; }
      .grade:first-child { background: var(--lime-soft); }
      .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
      label span { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 800; }
      input[type="text"], input[type="url"] {
        width: 100%; height: 52px; border: 1px solid var(--line); border-radius: 999px; padding: 10px 16px; background: #f7f8fa;
      }
      input:focus { outline: 3px solid rgba(199,255,0,.38); border-color: var(--lime); background: #fff; }
      .paste-zone {
        min-height: 120px;
        border: 1px dashed #c7cbd0;
        border-radius: 18px;
        background: #f7f8fa;
        display: grid;
        place-items: center;
        padding: 12px;
        text-align: center;
        cursor: pointer;
      }
      .paste-zone:focus {
        outline: 3px solid rgba(199,255,0,.38);
        border-color: var(--lime);
        background: #fff;
      }
      .paste-zone img {
        max-width: 100%;
        max-height: 170px;
        border-radius: 6px;
        display: block;
        object-fit: contain;
      }
      .paste-help {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }
      button, .download {
        border: 0; border-radius: 999px; background: var(--dark); color: #fff; height: 44px; padding: 0 18px;
        font-weight: 900; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
      }
      button:hover { background: #111412; }
      button.secondary, .download { background: #fff; color: var(--ink); border: 1px solid var(--line); }
      button.secondary:hover, .download:hover { background: var(--lime); border-color: var(--lime); }
      button.big { margin-top: 16px; height: 54px; width: 190px; font-size: 16px; background: var(--lime); color: var(--ink); }
      button.big:hover { background: #b8f000; }
      .result { display: none; margin-top: 18px; }
      .topline { display: flex; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); padding-bottom: 16px; }
      .badges { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; align-self: start; }
      .badge { background: var(--lime-soft); border-radius: 999px; padding: 9px 12px; text-align: center; font-size: 12px; font-weight: 900; }
      section { border-top: 1px solid var(--line); padding: 18px 0; }
      section:first-of-type { border-top: 0; }
      ol, .cards { margin: 0; padding: 0; list-style-position: inside; display: grid; gap: 8px; }
      li, .card { background: #f6f7f8; border-radius: 16px; padding: 12px; line-height: 1.55; font-size: 14px; }
      .copy-row { display: flex; gap: 8px; align-items: start; background: #f6f7f8; padding: 12px; border-radius: 16px; }
      .copy-row p { margin: 0; white-space: pre-wrap; line-height: 1.55; flex: 1; font-size: 14px; }
      .copy-row b { display: block; color: #667200; margin-bottom: 4px; }
      .notice { margin-top: 12px; color: #b42318; font-weight: 800; font-size: 14px; }
      @media (max-width: 820px) {
        header, .topline { flex-direction: column; align-items: stretch; }
        .dashboard { grid-template-columns: repeat(2, 1fr); }
        .form-grid, .badges, .product-grid { grid-template-columns: 1fr; }
        .search-row { flex-direction: column; align-items: stretch; }
        button.big { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <div class="brand">COUPANG-AI-SYSTEM</div>
          <h1>쿠팡 숏폼 콘텐츠 자동화</h1>
          <div class="quick-links" aria-label="자주가는 페이지">
            <a href="https://partners.coupang.com/" target="_blank">쿠팡 파트너스</a>
            <a href="https://link.inpock.co.kr/inpockhome" target="_blank">인포크</a>
          </div>
        </div>
        <div class="dashboard">
          <div class="stat"><strong id="todayCount">0</strong><span>오늘 생성 수</span></div>
          <div class="stat"><strong id="inforkPending">0</strong><span>인포크등록대기</span></div>
          <div class="stat"><strong id="videoPending">0</strong><span>영상 생성 대기</span></div>
          <div class="stat"><strong id="videoDone">0</strong><span>영상 생성 완료</span></div>
          <div class="stat"><strong id="uploadDone">0</strong><span>업로드 완료</span></div>
        </div>
      </header>

      <section class="panel" id="researchPanel">
        <div class="brand">상품 리서치 센터</div>
        <h2 style="margin-top:6px">원클릭으로 상품 아이디어 찾기</h2>
        <div class="research-grid">
          <div class="quick-buttons" id="quickButtons"></div>
          <div>
            <label>
              <span>직접 검색</span>
              <div class="search-row">
                <input id="researchQuery" type="text" placeholder="예: 무릎 관련 상품" />
                <button type="button" id="researchStart">리서치 시작</button>
              </div>
            </label>
            <p class="examples">예시: 시니어 인기상품 / 무릎 관련 상품 / 보행 보조 용품 / 실버용품 베스트</p>
          </div>
        </div>
        <div class="product-grid" id="researchResults"></div>
      </section>

      <form class="panel" id="contentForm" style="margin-top:18px">
        <div class="form-grid">
          <label>
            <span>상품 제목</span>
            <input id="productTitle" type="text" required placeholder="예: 무선 미니 청소기" />
          </label>
          <label>
            <span>상품 이미지 붙여넣기</span>
            <div id="pasteZone" class="paste-zone" tabindex="0">
              <p class="paste-help">이 영역을 클릭한 뒤<br />캡처한 상품 이미지를 Ctrl+V로 붙여넣으세요</p>
            </div>
          </label>
          <label>
            <span>쿠팡파트너스 링크</span>
            <input id="coupangLink" type="url" required placeholder="https://link.coupang.com/..." />
          </label>
        </div>
        <button class="big" type="submit">콘텐츠 생성</button>
        <div class="notice" id="notice"></div>
      </form>

      <div class="result" id="result"></div>
    </main>

    <script>
      const disclosure = "이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.";
      const state = { created: 0, inforkPending: 0, videoPending: 0, videoDone: 0, uploadDone: 0 };
      let pastedImage = null;
      let selectedResearchImage = "";

      const quickKeywords = ["시니어 인기상품", "부모님 선물", "60대 여성", "60대 남성", "관절 건강", "낙상 예방", "욕실 안전용품", "생활 편의용품", "수면용품", "건강관리용품"];
      const researchProducts = {
        "시니어 인기상품": ["초경량 접이식 보행 보조차", "무릎 보호 온열 찜질기", "침대 옆 안전 손잡이"],
        "부모님 선물": ["자동 혈압 측정기", "저소음 발 마사지기", "큰 글씨 디지털 시계"],
        "60대 여성": ["가벼운 무릎 보호대", "손목 부담 적은 주방 가위", "미끄럼 방지 욕실화"],
        "60대 남성": ["허리 지지 쿠션", "전동 면도기 세트", "보행 안정 지팡이"],
        "관절 건강": ["무릎 관절 보호대", "온열 무릎 마사지기", "손가락 재활 운동기"],
        "낙상 예방": ["침대 안전바", "욕실 미끄럼 방지 매트", "센서형 야간 무드등"],
        "욕실 안전용품": ["흡착식 욕실 손잡이", "미끄럼 방지 욕실 매트", "접이식 샤워 의자"],
        "생활 편의용품": ["긴 손잡이 구두주걱", "원터치 약통 정리함", "가벼운 장바구니 캐리어"],
        "수면용품": ["목 지지 경추 베개", "온열 수면 안대", "숙면용 무드등"],
        "건강관리용품": ["자동 혈압계", "혈당 관리 수첩 세트", "체온계와 약통 세트"]
      };

      function svgText(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&apos;" }[char]));
      }

      function productSvg(title, keyword) {
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360" viewBox="0 0 480 360"><rect width="480" height="360" fill="#f6f8fb"/><rect x="70" y="56" width="340" height="248" rx="22" fill="#ffffff" stroke="#dde3ea"/><circle cx="240" cy="142" r="48" fill="#0f8b8d" opacity=".18"/><path d="M172 220h136M188 246h104" stroke="#0f8b8d" stroke-width="14" stroke-linecap="round"/><text x="240" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#0f8b8d">${svgText(keyword)}</text><text x="240" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#1d232a">${svgText(title)}</text></svg>`;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      }

      function grade(seed, high = "A") {
        const grades = high === "S" ? ["S", "A+", "A"] : ["A+", "A", "B+"];
        return grades[seed % grades.length];
      }

      function buildResearch(keyword) {
        const normalized = keyword.trim() || "시니어 인기상품";
        const base = researchProducts[normalized] || [`${normalized} 베스트 상품`, `${normalized} 실사용 추천템`, `${normalized} 선물용 인기템`];
        return base.map((title, index) => ({
          title,
          image: productSvg(title, normalized),
          link: `https://www.coupang.com/np/search?q=${encodeURIComponent(title)}`,
          reason: `${normalized} 관심 고객에게 문제 해결 장면을 짧게 보여주기 좋아 숏폼 소재로 적합합니다.`,
          fit: grade(index, "S"),
          views: grade(index + 1, "S"),
          conversion: grade(index + 2)
        }));
      }

      function renderResearch(keyword) {
        const products = buildResearch(keyword);
        researchResults.innerHTML = products.map((item, index) => `
          <article class="product-card">
            <img src="${item.image}" alt="${escapeHtml(item.title)} 대표 이미지" />
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml(item.reason)}</p>
            <div class="grades">
              <div class="grade">콘텐츠 ${item.fit}</div>
              <div class="grade">조회수 ${item.views}</div>
              <div class="grade">전환 ${item.conversion}</div>
            </div>
            <div class="card-actions">
              <a href="${item.link}" target="_blank"><button type="button" class="secondary" style="width:100%">쿠팡 보기</button></a>
              <button type="button" onclick="selectResearchProduct(${index})">콘텐츠 생성</button>
            </div>
          </article>
        `).join("");
        window.currentResearchProducts = products;
      }

      function selectResearchProduct(index) {
        const item = window.currentResearchProducts[index];
        if (!item) return;
        productTitle.value = item.title;
        coupangLink.value = item.link;
        selectedResearchImage = item.image;
        pastedImage = { name: `${item.title}.png`, type: "image/png" };
        pasteZone.innerHTML = `<img src="${item.image}" alt="${escapeHtml(item.title)} 대표 이미지" /><p class="paste-help">리서치에서 선택한 이미지</p>`;
        contentForm.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function inferCategory(title) {
        if (/청소|세척|먼지|vacuum/i.test(title)) return "생활 정리";
        if (/가습|공기|향|디퓨저/i.test(title)) return "홈케어";
        if (/충전|케이블|거치|무선/i.test(title)) return "디지털 편의";
        if (/운동|마사지|스트레칭|헬스/i.test(title)) return "셀프케어";
        return "일상 편의";
      }

      function generate(title, link, imageName) {
        const category = inferCategory(title);
        const hooks = [
          `이거 하나로 ${category} 스트레스가 확 줄어듭니다`, `${title}, 왜 이제 알았지 싶은 아이템`,
          `바쁜 사람에게 딱 맞는 ${category} 해결템`, "써보면 매일 손이 가는 이유가 있습니다",
          "집에 두면 생각보다 훨씬 자주 씁니다", "선물용으로도 실패 확률 낮은 실사용템",
          "복잡한 기능보다 진짜 필요한 것만 담았습니다", "10초만 봐도 필요한지 바로 감이 옵니다",
          "후기 찾아보는 시간을 줄여주는 선택지", "가격보다 사용 빈도가 먼저 떠오르는 제품"
        ];
        const thumbs = ["왜 이제 샀지?", "매일 쓰는 이유", "10초 실사용", "집에 두면 편함", "선물템 후보", "후기 많은 이유", "생활이 쉬워짐", "깔끔한 해결템", "지금 필요한템", "실사용 추천"];
        const scripts = [
          `첫 3초: "이거 은근히 매일 필요합니다." 제품 클로즈업으로 시작합니다. 4-8초: 실제 사용 장면과 전후 차이를 보여줍니다. 9-12초: ${title}의 핵심 장점을 정리합니다. 마지막: 링크는 고정댓글에서 확인하세요.`,
          `첫 3초: "이런 상황 자주 겪는다면 보세요." 문제 장면을 먼저 보여줍니다. 4-9초: ${title}을 사용해 해결되는 장면을 보여줍니다. 10-15초: 추천 대상과 고지문구를 안내합니다.`,
          `첫 3초: "후기 찾아보다가 고른 이유." 제품 이미지와 핵심 문구를 크게 보여줍니다. 4-10초: 사용감, 보관, 편의 포인트를 보여줍니다. 11-15초: 고정댓글 링크 안내로 마무리합니다.`
        ];
        const captions = [
          `${title} 실사용 느낌만 짧게 정리했습니다. 필요한 분은 고정댓글 링크 확인해보세요.\n\n${disclosure}`,
          `요즘 이런 ${category} 아이템 찾는 분들 많죠. 영상처럼 쓰임새가 명확한 제품입니다.\n\n${disclosure}`,
          `후기 보기 전에 10초 사용 장면부터 확인하세요. 링크는 고정댓글에 남겨둘게요.\n\n${disclosure}`
        ];
        return {
          title, category, hooks, thumbs, scripts, captions,
          analysis: `${title}은 ${category} 상황에서 반복되는 작은 불편을 빠르게 해결하는 데 초점을 둔 숏폼형 추천 상품입니다.`,
          target: ["빠르게 제품 장단점을 파악하고 싶은 모바일 쇼핑 고객", `${category} 문제를 간단히 해결하고 싶은 20-40대 실사용자`, "선물 또는 생활 편의 제품을 찾는 쿠팡 이용자"],
          benefits: ["짧은 숏폼 안에서 사용 장면이 바로 이해됩니다", "복잡한 설명보다 실사용 전후 차이를 강조하기 좋습니다", "인포크, 쇼츠, 틱톡, 인스타에 동시에 재가공하기 쉽습니다"],
          youtube: `${title} 숏폼 리뷰입니다.\n\n구매 링크: ${link}\n\n${disclosure}`,
          tiktok: `${title} 10초 실사용 리뷰. 링크는 프로필/고정댓글 참고. ${disclosure}`,
          comment: `제품 링크: ${link}\n${disclosure}`,
          videoPrompt: `9:16 vertical short-form commerce video, 10-15 seconds, first 3 seconds strong Korean hook, product: ${title}, realistic product demo, bright natural lighting, problem-use-result flow, Korean captions`,
          thumbnailPrompt: `9:16 Korean commerce thumbnail, feature ${title}, large readable Korean headline, clean product-centered composition, bright shopping content style`,
          imageName
        };
      }

      function copyText(value) {
        navigator.clipboard.writeText(value || "");
      }

      function list(items) {
        return `<ol>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ol>`;
      }

      function copyRow(label, value, extra = "") {
        return `<div class="copy-row"><p><b>${label}</b>${escapeHtml(value || "없음")}</p><button class="secondary" onclick='copyText(${JSON.stringify(value || "")})'>복사</button>${extra}</div>`;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
      }

      function updateDashboard() {
        todayCount.textContent = state.created;
        inforkPending.textContent = state.inforkPending;
        videoPending.textContent = state.videoPending;
        videoDone.textContent = state.videoDone;
        uploadDone.textContent = state.uploadDone;
      }

      function setPastedImage(file) {
        if (!file || !file.type.startsWith("image/")) return;
        pastedImage = file;
        selectedResearchImage = "";
        const previewUrl = URL.createObjectURL(file);
        pasteZone.innerHTML = `<img src="${previewUrl}" alt="붙여넣은 상품 이미지 미리보기" /><p class="paste-help">${escapeHtml(file.name || "붙여넣은 이미지")}</p>`;
      }

      pasteZone.addEventListener("click", () => pasteZone.focus());
      pasteZone.addEventListener("paste", (event) => {
        const items = Array.from(event.clipboardData?.items || []);
        const imageItem = items.find((item) => item.type.startsWith("image/"));
        if (!imageItem) {
          notice.textContent = "클립보드에 이미지가 없습니다. 캡처 후 Ctrl+V로 붙여넣어 주세요.";
          return;
        }
        event.preventDefault();
        const file = imageItem.getAsFile();
        setPastedImage(file);
        notice.textContent = "이미지가 붙여넣어졌습니다.";
      });

      document.addEventListener("paste", (event) => {
        if (document.activeElement === pasteZone) return;
        const items = Array.from(event.clipboardData?.items || []);
        const imageItem = items.find((item) => item.type.startsWith("image/"));
        if (!imageItem) return;
        event.preventDefault();
        setPastedImage(imageItem.getAsFile());
        notice.textContent = "이미지가 붙여넣어졌습니다.";
      });

      contentForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const title = productTitle.value.trim();
        const link = coupangLink.value.trim();
        const imageName = pastedImage ? pastedImage.name || "붙여넣은 상품 이미지" : "붙여넣은 이미지 없음";
        const data = generate(title, link, imageName);
        state.created += 1;
        state.inforkPending += 1;
        state.videoPending += 1;
        updateDashboard();
        notice.textContent = "HTML 단독 버전입니다. Notion, Make, Higgsfield, Buffer 실제 연동은 Next.js/Node 버전에서 작동합니다.";
        result.style.display = "block";
        result.innerHTML = `
          <div class="topline">
            <div><div class="brand">생성 완료</div><h1>${escapeHtml(title)}</h1></div>
            <div class="badges"><div class="badge" id="inforkBadge">인포크등록대기</div><div class="badge">영상생성대기</div><div class="badge">업로드대기</div></div>
          </div>
          <section><h2>상품 분석</h2><div class="card">${escapeHtml(data.analysis)}</div></section>
          <section><h2>타겟 고객</h2>${list(data.target)}</section>
          <section><h2>핵심 장점</h2>${list(data.benefits)}</section>
          <section><h2>후킹 10개</h2>${list(data.hooks)}</section>
          <section><h2>썸네일 문구 10개</h2>${list(data.thumbs)}</section>
          <section><h2>영상 대본 3개</h2>${list(data.scripts)}</section>
          <section><h2>인스타 캡션 3개</h2>${list(data.captions)}</section>
          <section><h2>유튜브 설명란</h2>${copyRow("유튜브 설명란", data.youtube)}</section>
          <section><h2>틱톡 캡션</h2>${copyRow("틱톡 캡션", data.tiktok)}</section>
          <section><h2>고정댓글</h2>${copyRow("고정댓글", data.comment)}</section>
          <section><h2>쿠팡파트너스 고지문구</h2>${copyRow("고지문구", disclosure)}</section>
          <section><h2>Higgsfield 생성 데이터</h2>
            ${copyRow("영상 프롬프트", data.videoPrompt)}
            ${copyRow("썸네일 프롬프트", data.thumbnailPrompt)}
            <div class="card">영상 비율 9:16 / 숏폼 길이 10~15초 / 첫 3초 강력한 후킹 포함</div>
          </section>
          <section><h2>인포크 등록</h2>
            <div class="cards">
              ${copyRow("상품명", title)}
              ${copyRow("설명", `${title}\n\n${data.benefits.join("\n")}\n\n${disclosure}`)}
              ${copyRow("쿠팡파트너스 링크", link)}
              ${copyRow("이미지", imageName)}
              <label class="card"><input type="checkbox" id="inforkDone" /> 인포크 등록 완료</label>
            </div>
          </section>
        `;
        inforkDone.addEventListener("change", () => {
          if (inforkDone.checked) {
            inforkBadge.textContent = "인포크등록완료";
            state.inforkPending = Math.max(0, state.inforkPending - 1);
            updateDashboard();
          }
        });
      });

      quickButtons.innerHTML = quickKeywords.map((keyword) => `<button type="button" onclick="researchQuery.value='${keyword}'; renderResearch('${keyword}')">${keyword}</button>`).join("");
      researchStart.addEventListener("click", () => renderResearch(researchQuery.value));
      researchQuery.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          renderResearch(researchQuery.value);
        }
      });
      renderResearch("시니어 인기상품");
    </script>
  </body>
</html>
