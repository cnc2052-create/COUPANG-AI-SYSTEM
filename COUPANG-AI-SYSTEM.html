<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>COUPANG-AI-SYSTEM</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Malgun Gothic",sans-serif;background:#f6f8fb;color:#1d232a}main{max-width:1120px;margin:auto;padding:24px 16px 60px}header{display:flex;gap:18px;justify-content:space-between;align-items:end;margin-bottom:18px}h1{margin:4px 0 0;font-size:clamp(24px,4vw,40px)}h2{margin:0 0 12px;font-size:18px}.brand{color:#0f8b8d;font-weight:900;font-size:14px}.dashboard{display:grid;grid-template-columns:repeat(5,minmax(86px,1fr));gap:8px}.stat,.panel,.result{background:#fff;border:1px solid #dde3ea;border-radius:8px;box-shadow:0 1px 3px #0001}.stat{padding:12px;text-align:center}.stat strong{display:block;color:#0f8b8d;font-size:24px}.stat span{font-size:12px;font-weight:700}.panel,.result{padding:18px}.quick{display:flex;flex-wrap:wrap;gap:8px}.quick button,.secondary{background:#fff;color:#1d232a;border:1px solid #dde3ea}.search{display:flex;gap:8px;margin-top:14px}.search input{flex:1}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}.product{border:1px solid #dde3ea;border-radius:8px;padding:12px;display:grid;gap:10px}.product img{width:100%;aspect-ratio:4/3;object-fit:contain;background:#f6f8fb;border-radius:6px}.product h3{margin:0;font-size:16px}.product p{margin:0;color:#52616f;font-size:13px;line-height:1.5}.grades{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.grade{background:#f6f8fb;border-radius:6px;padding:8px;text-align:center;font-size:12px;font-weight:800}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}label span{display:block;margin-bottom:8px;font-size:14px;font-weight:800}input[type=text],input[type=url]{width:100%;height:48px;border:1px solid #dde3ea;border-radius:6px;padding:10px 12px;background:#fff}.paste{min-height:120px;border:1px dashed #9fb0bf;border-radius:8px;background:#f9fbfd;display:grid;place-items:center;padding:12px;text-align:center;cursor:pointer}.paste:focus{outline:3px solid #0f8b8d30;border-color:#0f8b8d}.paste img{max-width:100%;max-height:170px;border-radius:6px;object-fit:contain}.help{margin:0;color:#52616f;font-size:13px;line-height:1.5}button{border:0;border-radius:6px;background:#0f8b8d;color:#fff;height:42px;padding:0 16px;font-weight:900;cursor:pointer}.big{margin-top:16px;height:50px;width:180px;font-size:16px}.result{display:none;margin-top:18px}.top{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #dde3ea;padding-bottom:16px}.badges{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.badge,.item{background:#f6f8fb;border-radius:6px;padding:10px;font-size:13px}.section{border-top:1px solid #dde3ea;padding:18px 0}.copy{display:flex;gap:8px;background:#f6f8fb;padding:12px;border-radius:6px}.copy p{margin:0;white-space:pre-wrap;line-height:1.55;flex:1}.copy b{display:block;color:#0f8b8d}.notice{margin-top:12px;color:#b42318;font-weight:800;font-size:14px}@media(max-width:820px){header,.top{flex-direction:column;align-items:stretch}.dashboard{grid-template-columns:repeat(2,1fr)}.grid3,.cards,.badges{grid-template-columns:1fr}.search{flex-direction:column}.big{width:100%}}</style></head><body><main><header><div><div class="brand">COUPANG-AI-SYSTEM</div><h1>쿠팡 숏폼 콘텐츠 자동 생성</h1></div><div class="dashboard"><div class="stat"><strong id="todayCount">0</strong><span>오늘 생성 수</span></div><div class="stat"><strong id="inforkPending">0</strong><span>인포크 등록 대기</span></div><div class="stat"><strong id="videoPending">0</strong><span>영상 생성 대기</span></div><div class="stat"><strong id="videoDone">0</strong><span>영상 생성 완료</span></div><div class="stat"><strong id="uploadDone">0</strong><span>업로드 완료</span></div></div></header><section class="panel"><div class="brand">상품 리서치 센터</div><h2 style="margin-top:6px">원클릭으로 상품 아이디어 찾기</h2><div class="quick" id="quick"></div><div class="search"><input id="q" type="text" placeholder="예: 무릎 관련 상품"><button type="button" id="researchBtn">리서치 시작</button></div><p class="help">예시: 시니어 인기상품 / 무릎 관련 상품 / 보행 보조 용품 / 실버용품 베스트</p><div class="cards" id="research"></div></section><form class="panel" id="contentForm" style="margin-top:18px"><div class="grid3"><label><span>상품 제목</span><input id="productTitle" type="text" required placeholder="예: 무선 미니 청소기"></label><label><span>상품 이미지 붙여넣기</span><div id="pasteZone" class="paste" tabindex="0"><p class="help">이 영역을 클릭한 뒤<br>캡처한 상품 이미지를 Ctrl+V로 붙여넣으세요</p></div></label><label><span>쿠팡파트너스 링크</span><input id="coupangLink" type="url" required placeholder="https://link.coupang.com/..."></label></div><button class="big" type="submit">콘텐츠 생성</button><div class="notice" id="notice"></div></form><div class="result" id="result"></div></main><script>const disclosure="이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.";const state={created:0,inforkPending:0,videoPending:0,videoDone:0,uploadDone:0};let pastedImage=null;const keys=["시니어 인기상품","부모님 선물","60대 여성","60대 남성","관절 건강","낙상 예방","욕실 안전용품","생활 편의용품","수면용품","건강관리용품"];const db={"시니어 인기상품":["초경량 접이식 보행 보조차","무릎 보호 온열 찜질기","침대 옆 안전 손잡이"],"부모님 선물":["자동 혈압 측정기","저소음 발 마사지기","큰 글씨 디지털 시계"],"60대 여성":["가벼운 무릎 보호대","손목 부담 적은 주방 가위","미끄럼 방지 욕실화"],"60대 남성":["허리 지지 쿠션","전동 면도기 세트","보행 안정 지팡이"],"관절 건강":["무릎 관절 보호대","온열 무릎 마사지기","손가락 재활 운동기"],"낙상 예방":["침대 안전바","욕실 미끄럼 방지 매트","센서형 야간 무드등"],"욕실 안전용품":["흡착식 욕실 손잡이","미끄럼 방지 욕실 매트","접이식 샤워 의자"],"생활 편의용품":["긴 손잡이 구두주걱","원터치 약통 정리함","가벼운 장바구니 캐리어"],"수면용품":["목 지지 경추 베개","온열 수면 안대","숙면용 무드등"],"건강관리용품":["자동 혈압계","혈당 관리 수첩 세트","체온계와 약통 세트"]};function esc(v){return String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}function svgText(v){return String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&apos;"}[c]))}function img(title,k){const s=`<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360"><rect width="480" height="360" fill="#f6f8fb"/><rect x="70" y="56" width="340" height="248" rx="22" fill="#fff" stroke="#dde3ea"/><circle cx="240" cy="142" r="48" fill="#0f8b8d" opacity=".18"/><path d="M172 220h136M188 246h104" stroke="#0f8b8d" stroke-width="14" stroke-linecap="round"/><text x="240" y="124" text-anchor="middle" font-family="Arial" font-size="24" font-weight="800" fill="#0f8b8d">${svgText(k)}</text><text x="240" y="184" text-anchor="middle" font-family="Arial" font-size="24" font-weight="900" fill="#1d232a">${svgText(title)}</text></svg>`;return`data:image/svg+xml;charset=UTF-8,${encodeURIComponent(s)}`}function grade(i,s){return(s?["S","A+","A"]:["A+","A","B+"])[i%3]}function products(k){k=(k||"시니어 인기상품").trim();const base=db[k]||[`${k} 베스트 상품`,`${k} 실사용 추천템`,`${k} 선물용 인기템`];return base.map((title,i)=>({title,image:img(title,k),link:`https://www.coupang.com/np/search?q=${encodeURIComponent(title)}`,reason:`${k} 관심 고객에게 문제 해결 장면을 짧게 보여주기 좋아 숏폼 소재로 적합합니다.`,fit:grade(i,1),views:grade(i+1,1),conv:grade(i+2,0)}))}function render(k){const list=products(k);window.items=list;research.innerHTML=list.map((p,i)=>`<article class="product"><img src="${p.image}" alt="${esc(p.title)}"><h3>${esc(p.title)}</h3><p>${esc(p.reason)}</p><div class="grades"><div class="grade">콘텐츠 ${p.fit}</div><div class="grade">조회수 ${p.views}</div><div class="grade">전환 ${p.conv}</div></div><div class="actions"><a href="${p.link}" target="_blank"><button type="button" class="secondary" style="width:100%">쿠팡 보기</button></a><button type="button" onclick="pick(${i})">콘텐츠 생성</button></div></article>`).join("")}function pick(i){const p=window.items[i];if(!p)return;productTitle.value=p.title;coupangLink.value=p.link;pastedImage={name:`${p.title}.png`,type:"image/png"};pasteZone.innerHTML=`<img src="${p.image}" alt="${esc(p.title)}"><p class="help">리서치에서 선택한 이미지</p>`;contentForm.scrollIntoView({behavior:"smooth",block:"start"})}function update(){todayCount.textContent=state.created;inforkPending.textContent=state.inforkPending;videoPending.textContent=state.videoPending;videoDone.textContent=state.videoDone;uploadDone.textContent=state.uploadDone}function setImg(f){if(!f||!f.type.startsWith("image/"))return;pastedImage=f;pasteZone.innerHTML=`<img src="${URL.createObjectURL(f)}" alt="붙여넣은 상품 이미지"><p class="help">${esc(f.name||"붙여넣은 이미지")}</p>`}function category(t){if(/청소|세척|먼지/i.test(t))return"생활 정리";if(/가습|공기|향|디퓨저/i.test(t))return"홈케어";if(/충전|케이블|거치|무선/i.test(t))return"디지털 편의";if(/운동|마사지|스트레칭|헬스/i.test(t))return"셀프케어";return"일상 편의"}function gen(t,l){const c=category(t);return{analysis:`${t}은 ${c} 상황에서 반복되는 작은 불편을 빠르게 해결하는 데 초점을 둔 숏폼형 추천 상품입니다.`,target:["빠르게 제품 장단점을 파악하고 싶은 모바일 쇼핑 고객",`${c} 문제를 간단히 해결하고 싶은 20-40대 실사용자`,"선물 또는 생활 편의 제품을 찾는 쿠팡 이용자"],benefits:["짧은 숏폼 안에서 사용 장면이 바로 이해됩니다","복잡한 설명보다 실사용 전후 차이를 강조하기 좋습니다","인포크, 쇼츠, 틱톡, 인스타에 동시에 재가공하기 쉽습니다"],hooks:[`이거 하나로 ${c} 스트레스가 확 줄어듭니다`,`${t}, 왜 이제 알았지 싶은 아이템`,`바쁜 사람에게 딱 맞는 ${c} 해결템`,`써보면 매일 손이 가는 이유가 있습니다`,`집에 두면 생각보다 훨씬 자주 씁니다`,`선물용으로도 실패 확률 낮은 실사용템`,`복잡한 기능보다 진짜 필요한 것만 담았습니다`,`10초만 봐도 필요한지 바로 감이 옵니다`,`후기 찾아보는 시간을 줄여주는 선택지`,`가격보다 사용 빈도가 먼저 떠오르는 제품`],thumbs:["왜 이제 샀지?","매일 쓰는 이유","10초 실사용","집에 두면 편함","선물템 후보","후기 많은 이유","생활이 쉬워짐","깔끔한 해결템","지금 필요한템","실사용 추천"],scripts:[`첫 3초: "이거 은근히 매일 필요합니다." 제품 클로즈업으로 시작합니다. 4-8초: 실제 사용 장면과 전후 차이를 보여줍니다. 9-12초: ${t}의 핵심 장점을 정리합니다. 마지막: 링크는 고정댓글에서 확인하세요.`,`첫 3초: "이런 상황 자주 겪는다면 보세요." 문제 장면을 먼저 보여줍니다. 4-9초: ${t}을 사용해 해결되는 장면을 보여줍니다. 10-15초: 추천 대상과 고지문구를 안내합니다.`,`첫 3초: "후기 찾아보다가 고른 이유." 제품 이미지와 핵심 문구를 크게 보여줍니다. 4-10초: 사용감, 보관, 편의 포인트를 보여줍니다. 11-15초: 고정댓글 링크 안내로 마무리합니다.`],captions:[`${t} 실사용 느낌만 짧게 정리했습니다. 필요한 분은 고정댓글 링크 확인해보세요.\n\n${disclosure}`,`요즘 이런 ${c} 아이템 찾는 분들 많죠. 영상처럼 쓰임새가 명확한 제품입니다.\n\n${disclosure}`,`후기 보기 전에 10초 사용 장면부터 확인하세요. 링크는 고정댓글에 남겨둘게요.\n\n${disclosure}`],youtube:`${t} 숏폼 리뷰입니다.\n\n구매 링크: ${l}\n\n${disclosure}`,tiktok:`${t} 10초 실사용 리뷰. 링크는 프로필/고정댓글 참고. ${disclosure}`,comment:`제품 링크: ${l}\n${disclosure}`,video:`9:16 vertical short-form commerce video, 10-15 seconds, first 3 seconds strong Korean hook, product: ${t}, realistic product demo, bright natural lighting, problem-use-result flow, Korean captions`,thumb:`9:16 Korean commerce thumbnail, feature ${t}, large readable Korean headline, clean product-centered composition`}}function rows(a){return`<ol>${a.map(x=>`<li class="item">${esc(x)}</li>`).join("")}</ol>`}function copy(label,v){return`<div class="copy"><p><b>${label}</b>${esc(v||"없음")}</p><button class="secondary" onclick='navigator.clipboard.writeText(${JSON.stringify(v||"")})'>복사</button></div>`}pasteZone.onclick=()=>pasteZone.focus();pasteZone.onpaste=e=>{const it=[...(e.clipboardData?.items||[])].find(x=>x.type.startsWith("image/"));if(!it){notice.textContent="클립보드에 이미지가 없습니다. 캡처 후 Ctrl+V로 붙여넣어 주세요.";return}e.preventDefault();setImg(it.getAsFile());notice.textContent="이미지가 붙여넣어졌습니다."};document.addEventListener("paste",e=>{if(document.activeElement===pasteZone)return;const it=[...(e.clipboardData?.items||[])].find(x=>x.type.startsWith("image/"));if(it){e.preventDefault();setImg(it.getAsFile());notice.textContent="이미지가 붙여넣어졌습니다."}});contentForm.onsubmit=e=>{e.preventDefault();const t=productTitle.value.trim(),l=coupangLink.value.trim(),name=pastedImage?pastedImage.name||"붙여넣은 상품 이미지":"붙여넣은 이미지 없음",d=gen(t,l);state.created++;state.inforkPending++;state.videoPending++;update();notice.textContent="HTML 단독 버전입니다. Notion, Make, Higgsfield, Buffer 실제 연동은 Next.js/Node 버전에서 작동합니다.";result.style.display="block";result.innerHTML=`<div class="top"><div><div class="brand">생성 완료</div><h1>${esc(t)}</h1></div><div class="badges"><div class="badge" id="inforkBadge">인포크등록대기</div><div class="badge">영상생성대기</div><div class="badge">업로드대기</div></div></div><div class="section"><h2>상품 분석</h2><div class="item">${esc(d.analysis)}</div></div><div class="section"><h2>타겟 고객</h2>${rows(d.target)}</div><div class="section"><h2>핵심 장점</h2>${rows(d.benefits)}</div><div class="section"><h2>후킹 10개</h2>${rows(d.hooks)}</div><div class="section"><h2>썸네일 문구 10개</h2>${rows(d.thumbs)}</div><div class="section"><h2>영상 대본 3개</h2>${rows(d.scripts)}</div><div class="section"><h2>인스타 캡션 3개</h2>${rows(d.captions)}</div><div class="section"><h2>유튜브 설명란</h2>${copy("유튜브 설명란",d.youtube)}</div><div class="section"><h2>틱톡 캡션</h2>${copy("틱톡 캡션",d.tiktok)}</div><div class="section"><h2>고정댓글</h2>${copy("고정댓글",d.comment)}</div><div class="section"><h2>쿠팡파트너스 고지문구</h2>${copy("고지문구",disclosure)}</div><div class="section"><h2>Higgsfield 생성 데이터</h2>${copy("영상 프롬프트",d.video)}${copy("썸네일 프롬프트",d.thumb)}<div class="item">영상 비율 9:16 / 숏폼 길이 10~15초 / 첫 3초 강력한 후킹 포함</div></div><div class="section"><h2>인포크 등록</h2>${copy("상품명",t)}${copy("설명",`${t}\n\n${d.benefits.join("\n")}\n\n${disclosure}`)}${copy("링크",l)}${copy("이미지",name)}<label class="item"><input type="checkbox" id="inforkDone"> 인포크 등록 완료</label></div>`;inforkDone.onchange=()=>{if(inforkDone.checked){inforkBadge.textContent="인포크등록완료";state.inforkPending=Math.max(0,state.inforkPending-1);update()}}};quick.innerHTML=keys.map(k=>`<button type="button" onclick="q.value='${k}';render('${k}')">${k}</button>`).join("");researchBtn.onclick=()=>render(q.value);q.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();render(q.value)}};render("시니어 인기상품");</script></body></html>
